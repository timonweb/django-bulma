name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            tox-envs: 'django42,django52'
          - python-version: '3.11'
            tox-envs: 'django42,django52'
          - python-version: '3.12'
            tox-envs: 'django42,django52,django60'
          - python-version: '3.13'
            tox-envs: 'django52,django60'
          - python-version: '3.14'
            tox-envs: 'django52,django60'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: 'uv.lock'

    - name: Install dependencies
      run: uv sync --dev

    - name: Run tests
      run: uv run tox -e ${{ matrix.tox-envs }}

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports-${{ matrix.python-version }}
        path: test-reports/
